description: Symetra is a Sumitomo-Life-owned financial services company offering insurance, annuities, and employee benefits. The Benefits Administration, Annuities, and Life Insurance APIs are partner integrations (HR platforms, broker platforms, financial-advisor systems); they are not exposed as a public, self-service API with published pricing. Access and any usage charges are negotiated as part of an integration agreement.
sources:
  - https://www.symetra.com
  - https://www.symetra.com/learn/articles-for-employers/technology-solutions/
notes: No public API portal or pricing page. APIs are provisioned through partner-integration agreements with HR platforms, brokers, and financial institutions; pricing is bundled into commercial relationships rather than charged per API call.
