aid: symetra-financial
url: https://raw.githubusercontent.com/api-evangelist/symetra-financial/refs/heads/main/apis.yml
name: Symetra Financial
description: >-
  Symetra Financial Corporation is a diversified financial services company
  headquartered in Bellevue, Washington, providing employee benefits, annuities,
  and life insurance products to individuals, families, and businesses through
  independent advisors and financial institutions. A subsidiary of Sumitomo Life
  Insurance Company since 2016, Symetra offers medical stop-loss insurance, group
  life and disability income protection, supplemental health coverage, fixed and
  indexed annuities, registered index-linked annuities, income annuities, term
  life, and permanent life insurance. The company offers API and EDI-based data
  integrations for benefits administrators and HR platforms.
