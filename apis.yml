apis:
  - aid: symetra-financial:symetra-benefits-api
    name: Symetra Benefits Administration API
    description: >-
      Symetra's Benefits Administration API enables HR platforms, benefits
      administrators, and technology partners to integrate with Symetra's group
      benefits products. The API supports automated data exchange for enrollment,
      eligibility, claims, short-term disability, absence management, and
      stop-loss insurance. It provides single sign-on (SSO) connectivity for
      evidence of insurability (EOI) and automated decision status updates,
      integrating with platforms such as Workday.
    humanURL: https://www.symetra.com/learn/articles-for-employers/technology-solutions/
    baseURL: https://api.symetra.com
    tags:
      - Benefits Administration
      - Claims
      - EDI
      - Eligibility
      - Employee Benefits
      - Enrollment
      - HR Integration
      - Insurance
      - Stop Loss
    properties:
      - type: Documentation
        url: https://www.symetra.com/learn/articles-for-employers/technology-solutions/
      - type: Website
        url: https://www.symetra.com/for-employers/
  - aid: symetra-financial:symetra-annuities-api
    name: Symetra Annuities API
    description: >-
      API for accessing Symetra annuity product information, rates, and
      illustrations. Supports fixed deferred annuities, fixed indexed annuities,
      registered index-linked annuities (RILA), and income annuities. Used by
      financial institutions and independent advisors to generate product
      illustrations, submit new business, and manage in-force contracts.
    humanURL: https://www.symetra.com/annuities/
    baseURL: https://api.symetra.com
    tags:
      - Annuities
      - Financial Advisors
      - Financial Services
      - Fixed Annuities
      - Income Annuities
      - Indexed Annuities
      - Insurance
      - RILA
      - Retirement
    properties:
      - type: Documentation
        url: https://www.symetra.com/annuities/
      - type: Website
        url: https://www.symetra.com/annuities/
  - aid: symetra-financial:symetra-life-insurance-api
    name: Symetra Life Insurance API
    description: >-
      API supporting Symetra's life insurance products including term life,
      SwiftTerm (instant-issue life insurance), and permanent life insurance.
      Enables financial advisors and distribution partners to access product
      information, request quotes, submit applications, track underwriting
      decisions, and manage in-force policies.
    humanURL: https://www.symetra.com/life-insurance/
    baseURL: https://api.symetra.com
    tags:
      - Financial Advisors
      - Insurance
      - Life Insurance
      - Permanent Life
      - Policy Management
      - Term Life
      - Underwriting
    properties:
      - type: Documentation
        url: https://www.symetra.com/life-insurance/
      - type: Website
        url: https://www.symetra.com/life-insurance/
