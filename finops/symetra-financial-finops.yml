meters:
  - name: partner_integration
    description: Partner integration relationships - the unit of consumption for Symetra's APIs is the connectivity agreement, not per-call.
    unit: varies
    aggregation: count
principles:
  - name: Visibility
    description: Cost visibility flows through Symetra account management to the partner; there is no self-service usage console or FOCUS-aligned export.
  - name: Allocation
    description: Allocate against the partner relationship (HR platform, broker, advisor) rather than per API call - that is the contractual unit Symetra prices on.
  - name: Optimization
    description: Optimization is contractual - reduce manual EOI / claims handoffs and rely on the API for straight-through processing to lower per-transaction operating cost on the partner side.
  - name: Accountability
    description: The partner's integration owner and the Symetra account team jointly own the relationship; commercial review happens at contract renewal.
